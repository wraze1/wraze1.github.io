<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Мини-казино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        h1 {
            color: gold;
            margin-bottom: 30px;
        }
        .balance {
            background: rgba(255,215,0,0.1);
            border: 2px solid gold;
            border-radius: 20px;
            padding: 20px;
            font-size: 24px;
            margin: 20px 0;
        }
        .games {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .game-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid gold;
            border-radius: 15px;
            padding: 20px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
        }
        .game-btn.selected {
            background: gold;
            color: black;
        }
        .bet-input {
            width: 200px;
            padding: 15px;
            font-size: 20px;
            border: 2px solid gold;
            border-radius: 10px;
            background: #1a1a2e;
            color: white;
            margin: 20px;
        }
        .play-btn {
            background: gold;
            color: black;
            border: none;
            padding: 20px 40px;
            font-size: 24px;
            border-radius: 50px;
            cursor: pointer;
            margin: 20px;
        }
        .result {
            margin-top: 20px;
            padding: 20px;
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <h1>🎰 МИНИ-КАЗИНО</h1>
    
    <div class="balance" id="balanceDisplay">💰 Загрузка...</div>

    <div class="games">
        <button class="game-btn" onclick="selectGame('Ракета')">🚀 Ракета</button>
        <button class="game-btn" onclick="selectGame('Стройка')">🏗️ Стройка</button>
        <button class="game-btn" onclick="selectGame('Кости')">🎲 Кости</button>
        <button class="game-btn" onclick="selectGame('Слоты')">🎰 Слоты</button>
    </div>

    <input type="number" id="betInput" class="bet-input" value="10" min="1">
    <br>
    <button class="play-btn" id="playBtn" onclick="playGame()">🎮 ИГРАТЬ</button>
    
    <div class="result" id="resultDisplay">
        👆 Выбери игру и нажми "ИГРАТЬ"
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let selectedGame = null;
        
        tg.expand();
        tg.ready();
        
        // Запрашиваем баланс при загрузке
        tg.sendData(JSON.stringify({ action: 'get_balance' }));

        function selectGame(game) {
            selectedGame = game;
            document.querySelectorAll('.game-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            event.target.classList.add('selected');
        }

        function playGame() {
            if (!selectedGame) {
                alert('Сначала выбери игру!');
                return;
            }

            let bet = parseInt(document.getElementById('betInput').value);
            if (isNaN(bet) || bet < 1) {
                alert('Ставка должна быть положительным числом!');
                return;
            }

            document.getElementById('playBtn').disabled = true;
            document.getElementById('resultDisplay').innerHTML = '⏳ Играем...';

            // ОТПРАВЛЯЕМ ДАННЫЕ В БОТА
            tg.sendData(JSON.stringify({
                action: 'play',
                game: selectedGame,
                bet: bet
            }));
        }

        // Слушаем ответы от бота
        tg.onEvent('message', function(event) {
            let data = JSON.parse(event.data);
            console.log('Ответ от бота:', data);

            if (data.balance !== undefined) {
                document.getElementById('balanceDisplay').innerHTML = `💰 Баланс: ${data.balance}🌟`;
            }

            if (data.result) {
                document.getElementById('resultDisplay').innerHTML = data.result;
                document.getElementById('playBtn').disabled = false;
            }

            if (data.new_balance !== undefined) {
                document.getElementById('balanceDisplay').innerHTML = `💰 Баланс: ${data.new_balance}🌟`;
            }
        });
    </script>
</body>
</html>
