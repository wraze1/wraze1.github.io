<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Казино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: #1a1a2e;
            color: white;
            text-align: center;
            padding: 20px;
            font-family: Arial;
        }
        .balance {
            font-size: 32px;
            background: gold;
            color: black;
            padding: 20px;
            border-radius: 20px;
            margin: 20px;
        }
        button {
            background: gold;
            color: black;
            font-size: 24px;
            padding: 20px 40px;
            border: none;
            border-radius: 50px;
            margin: 10px;
            width: 200px;
        }
        input {
            font-size: 24px;
            padding: 10px;
            margin: 10px;
            width: 150px;
        }
    </style>
</head>
<body>
    <div class="balance" id="balance">Загрузка...</div>
    
    <input type="number" id="bet" value="10" min="1">
    <br>
    <button onclick="play()">🎮 ИГРАТЬ</button>
    <br>
    <div id="result" style="font-size: 24px; margin: 20px;"></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        
        // Запрашиваем баланс
        tg.sendData(JSON.stringify({action: 'get_balance'}));
        
        function play() {
            let bet = document.getElementById('bet').value;
            tg.sendData(JSON.stringify({
                action: 'play',
                bet: parseInt(bet)
            }));
            document.getElementById('result').innerHTML = '⏳ Играем...';
        }
        
        // Слушаем ответ
        tg.onEvent('message', function(event) {
            let data = JSON.parse(event.data);
            if (data.balance !== undefined) {
                document.getElementById('balance').innerHTML = '💰 ' + data.balance + '🌟';
            }
            if (data.result) {
                document.getElementById('result').innerHTML = data.result;
            }
            if (data.new_balance !== undefined) {
                document.getElementById('balance').innerHTML = '💰 ' + data.new_balance + '🌟';
            }
        });
    </script>
</body>
</html>
