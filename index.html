<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 Мини-казино</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }
        .balance {
            font-size: 32px;
            background: #ffd700;
            color: #1a1a2e;
            padding: 20px;
            border-radius: 20px;
            margin: 20px;
            font-weight: bold;
        }
        .games {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px;
        }
        .game-btn {
            background: rgba(255,255,255,0.1);
            border: 2px solid #ffd700;
            padding: 20px;
            border-radius: 15px;
            cursor: pointer;
            font-size: 18px;
            transition: 0.3s;
        }
        .game-btn.selected {
            background: #ffd700;
            color: #1a1a2e;
            transform: scale(1.05);
        }
        .bet-input {
            font-size: 24px;
            padding: 15px;
            margin: 20px;
            width: 200px;
            border: 2px solid #ffd700;
            border-radius: 15px;
            background: #1a1a2e;
            color: white;
            text-align: center;
        }
        .play-btn {
            background: #ffd700;
            color: #1a1a2e;
            font-size: 32px;
            padding: 20px 50px;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            margin: 20px;
        }
        .result {
            font-size: 24px;
            margin: 20px;
            padding: 20px;
            border-radius: 15px;
            background: rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>
    <div class="balance" id="balance">Загрузка...</div>
    
    <div class="games">
        <div class="game-btn" onclick="selectGame('Ракета')">🚀 Ракета</div>
        <div class="game-btn" onclick="selectGame('Стройка')">🏗️ Стройка</div>
        <div class="game-btn" onclick="selectGame('Кости')">🎲 Кости</div>
        <div class="game-btn" onclick="selectGame('Слоты')">🎰 Слоты</div>
    </div>

    <input type="number" id="bet" class="bet-input" value="10" min="1">
    <br>
    <button class="play-btn" onclick="play()">🎮 ИГРАТЬ</button>
    
    <div class="result" id="result"></div>

    <script>
        let tg = window.Telegram.WebApp;
        let selectedGame = '';
        
        tg.expand();
        tg.ready();
        
        // Запрашиваем баланс
        tg.sendData(JSON.stringify({action: 'get_balance'}));
        
        function selectGame(game) {
            selectedGame = game;
            // Убираем выделение со всех
            document.querySelectorAll('.game-btn').forEach(btn => {
                btn.classList.remove('selected');
            });
            // Выделяем выбранную
            event.target.classList.add('selected');
        }
        
        function play() {
            if (!selectedGame) {
                tg.showAlert('❌ Выбери игру!');
                return;
            }
            
            let bet = document.getElementById('bet').value;
            if (bet < 1) {
                tg.showAlert('❌ Ставка должна быть больше 0!');
                return;
            }
            
            document.getElementById('result').innerHTML = '⏳ Играем...';
            
            tg.sendData(JSON.stringify({
                action: 'play',
                game: selectedGame,
                bet: parseInt(bet)
            }));
        }
        
        // Слушаем ответы
        tg.onEvent('message', function(event) {
            let data = JSON.parse(event.data);
            console.log('Ответ:', data);
            
            if (data.balance !== undefined) {
                document.getElementById('balance').innerHTML = '💰 ' + data.balance + '🌟';
            }
            
            if (data.result) {
                document.getElementById('result').innerHTML = data.result;
            }
            
            if (data.new_balance !== undefined) {
                document.getElementById('balance').innerHTML = '💰 ' + data.new_balance + '🌟';
            }
        });
    </script>
</body>
</html>
