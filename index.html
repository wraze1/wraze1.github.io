<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 КАЗИНО ИГРЫ</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 32px;
            margin-bottom: 30px;
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255,215,0,0.3);
        }

        .balance {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
            border: 2px solid #ffd700;
        }

        .games-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .game-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 25px 15px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            border: 2px solid transparent;
        }

        .game-card:hover {
            border-color: #ffd700;
            transform: scale(1.05);
            background: rgba(255,215,0,0.1);
        }

        .game-emoji {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .game-title {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .game-desc {
            font-size: 14px;
            color: #888;
        }

        .info {
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            padding: 20px;
            font-size: 14px;
            line-height: 1.6;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 МИНИ-КАЗИНО</h1>
        
        <div class="balance" id="balance">
            Загрузка баланса...
        </div>

        <div class="games-grid">
            <div class="game-card" onclick="startGame('rocket')">
                <div class="game-emoji">🚀</div>
                <div class="game-title">Ракета</div>
                <div class="game-desc">Множитель до x10</div>
            </div>

            <div class="game-card" onclick="startGame('tower')">
                <div class="game-emoji">🏗️</div>
                <div class="game-title">Стройка</div>
                <div class="game-desc">Построй башню</div>
            </div>

            <div class="game-card" onclick="startGame('dice')">
                <div class="game-emoji">🎲</div>
                <div class="game-title">Кости</div>
                <div class="game-desc">Классика</div>
            </div>

            <div class="game-card" onclick="startGame('slots')">
                <div class="game-emoji">🎰</div>
                <div class="game-title">Слоты</div>
                <div class="game-desc">Крути барабаны</div>
            </div>
        </div>

        <div class="info">
            ⚡ Как играть:<br>
            • Выбери игру<br>
            • Сделай ставку<br>
            • Забери выигрыш<br>
            • Джекпот 1% с каждой игры
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let userBalance = 0;
        
        // На весь экран
        tg.expand();
        tg.ready();
        
        // Запрашиваем баланс
        tg.sendData(JSON.stringify({
            action: 'get_balance'
        }));
        
        function startGame(game) {
            tg.sendData(JSON.stringify({
                action: 'play',
                game: game
            }));
        }
        
        // Слушаем сообщения от бота
        window.addEventListener('message', function(event) {
            let data = JSON.parse(event.data);
            if (data.balance) {
                document.getElementById('balance').innerHTML = 
                    `💰 Баланс: ${data.balance}🌟`;
                userBalance = data.balance;
            }
        });
    </script>
</body>
</html>
